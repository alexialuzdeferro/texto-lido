    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pombagiras/melusine/refs/heads/main/Al%C3%AA%20(3)%20(3)%20(1).png">

    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #4b0082; /* Roxo Indigo Profundo */
            --glass: rgba(15, 15, 20, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e0e0e0;
        }

        body {
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a002b 0%, #050505 100%);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            box-sizing: border-box;
        }

        .header-instruction {
            font-size: 0.75rem;
            text-align: center;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        h1 {
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            color: var(--accent-purple);
            text-transform: uppercase;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 5px rgba(75, 0, 130, 0.5));
        }

        textarea {
            width: 100%;
            height: 320px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 15px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }

        textarea:focus { border-color: var(--accent-purple); }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 10px;
            color: #666;
            text-transform: uppercase;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-main { 
            background: var(--accent-purple); 
            grid-column: span 2; 
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.4);
        }

        .btn-sec { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        
        .btn-md { 
            background: #1a1a2e; 
            border: 1px solid var(--accent-purple); 
            grid-column: span 2; 
            color: #bb86fc;
        }

        .btn:active { transform: scale(0.96); }
        .btn:hover { opacity: 0.9; background: #5d00a3; }

        #status-msg {
            text-align: center;
            font-size: 0.7rem;
            margin: 15px 0;
            color: #bb86fc;
            height: 12px;
            font-style: italic;
        }

        footer { font-size: 0.6rem; margin-top: 20px; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Portal Visceral v2.5</h1>
    
    <div class="header-instruction">
        OUÇA O QUE ESTÁ ESCRITO E TRANSFORME EM MARKDOWN<br>
        (O rito da voz e a lapidação da matéria)
    </div>

    <textarea id="main-text" oninput="updateStats()" placeholder="Cole seu texto para transmutação..."></textarea>
    
    <div class="stats">
        <span id="char-count">0 Caracteres</span>
        <span id="read-time">0 min de leitura</span>
    </div>

    <div id="status-msg"></div>

    <div class="grid-buttons">
        <button class="btn btn-main" onclick="falar()">Invocação de Voz</button>
        <button class="btn btn-sec" onclick="limpar()">Limpar</button>
        <button class="btn btn-sec" onclick="copiar()">Copiar Texto</button>
        <button class="btn btn-md" onclick="gerarMarkdown()">Toque de Mestre (Markdown)</button>
    </div>
</div>

<footer>ALEXIA MELUSINE | ALMAS DE POMBAGIRA</footer>

<script>
    const input = document.getElementById('main-text');
    const status = document.getElementById('status-msg');
    const charCount = document.getElementById('char-count');
    const readTime = document.getElementById('read-time');

    function updateStats() {
        const text = input.value;
        charCount.innerText = `${text.length} Caracteres`;
        const words = text.trim().split(/\s+/).length;
        const time = Math.ceil(words / 150);
        readTime.innerText = `${text.length > 0 ? time : 0} min de leitura`;
    }

    function haptic() { if (navigator.vibrate) navigator.vibrate(50); }

    function notify(msg) {
        status.innerText = msg;
        setTimeout(() => status.innerText = "", 3000);
    }

    function falar() {
        haptic();
        if (!input.value) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(input.value);
        const voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Maria')));
        msg.voice = voice || voices.find(v => v.lang === 'pt-BR');
        msg.rate = 0.88;
        window.speechSynthesis.speak(msg);
        notify("A voz emana das profundezas...");
    }

    function limpar() { haptic(); input.value = ""; updateStats(); notify("Tabula rasa."); }

    function copiar() {
        haptic();
        navigator.clipboard.writeText(input.value);
        notify("Texto copiado com sucesso.");
    }

    function gerarMarkdown() {
        haptic();
        if (!input.value) return;
        
        const data = new Date().toLocaleDateString('pt-BR');
        const header = `--- \n**PORTAL VISCERAL | EDITORIAL**\n_Data: ${data}_\n--- \n\n`;
        const assinatura = `\n\n---\n\n### ✒️ Alexia Melusine\n*Diretora de Arte Visceral | Vortex de Pombagiras*`;
        
        // Removemos o símbolo ">" para o texto fluir normalmente no Medium
        let corpo = input.value; 
        
        input.value = header + corpo + assinatura;
        updateStats();
        notify("Markdown lapidado sem aspas!");
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>

</body>
